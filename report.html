<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应链模拟游戏 - 结算报告</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .kpi {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">供应链模拟游戏</span>
            <div class="d-flex">
                <button id="logoutBtn" class="btn btn-outline-light btn-sm me-2">退出</button>
                <a href="decision.html" class="btn btn-outline-light btn-sm">返回决策</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex flex-wrap justify-content-between align-items-end gap-2 mb-3">
            <div>
                <h2 class="mb-1">第 <span id="reportMonth">-</span> 月结算报告</h2>
                <div class="text-secondary small">建议：先看利润，再结合趋势图判断是否“缺货”或“积压”。</div>
            </div>
            <div class="d-flex gap-2">
                <a href="decision.html" class="btn btn-primary">继续下一月</a>
                <a href="teacher.html" class="btn btn-outline-secondary">教师端</a>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-success text-white">销售结果</div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-6">
                                <div class="p-3 rounded-3 border bg-white h-100">
                                    <div class="text-secondary small">实际需求</div>
                                    <div class="h4 mb-0 kpi" id="actualDemand">-</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="p-3 rounded-3 border bg-white h-100">
                                    <div class="text-secondary small">实际销售</div>
                                    <div class="h4 mb-0 kpi" id="actualSales">-</div>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="p-3 rounded-3 border bg-white">
                                    <div class="text-secondary small">销售收入</div>
                                    <div class="h4 mb-0 kpi" id="revenue">¥0</div>
                                </div>
                            </div>
                        </div>
                        <div class="alert alert-light border mt-3 mb-0 small">
                            实际销售 = min(可用成品, 实际需求)。若实际销售明显小于需求，说明发生缺货。
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-danger text-white">成本与利润</div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-12">
                                <div class="p-3 rounded-3 border bg-white">
                                    <div class="text-secondary small">总成本</div>
                                    <div class="h4 mb-0 kpi" id="totalCost">¥0</div>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="p-3 rounded-3 border bg-white">
                                    <div class="text-secondary small">本月利润</div>
                                    <div class="h3 mb-0 kpi fw-semibold" id="profit">¥0</div>
                                </div>
                            </div>
                        </div>
                        <div class="alert alert-light border mt-3 mb-0 small">
                            总成本包含采购成本、库存持有成本，以及库存超仓的超额成本（如有）。
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm mt-4 mb-4">
            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                <span>历史趋势</span>
                <span class="small opacity-75">利润 / 收入 / 成本</span>
            </div>
            <div class="card-body">
                <canvas id="historyChart" height="110"></canvas>
                <div class="text-secondary small mt-2">趋势图来自历史已结算月份，可用于判断策略是否稳定。</div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
