version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8005:8005"
    volumes:
      - ./backend/game.db:/app/game.db
    restart: always

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    restart: always
