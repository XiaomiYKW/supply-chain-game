<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应链模拟游戏 - 决策</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">供应链模拟游戏</span>
            <div class="d-flex">
                <span class="text-light me-3" id="userInfo">学生: - | 第 1 月</span>
                <button id="logoutBtn" class="btn btn-outline-light btn-sm me-2">退出</button>
                <a href="index.html" class="btn btn-outline-light btn-sm">退出</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header bg-info text-white">当前状态</div>
                    <div class="card-body">
                        <p>现金: <span id="currentCash">¥100,000</span></p>
                        <p>原材料库存: <span id="rawStock">500</span></p>
                        <p>成品库存: <span id="fgStock">200</span></p>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">本月决策</div>
                    <div class="card-body">
                        <form id="decisionForm">
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">需求预测</label>
                                    <input type="number" class="form-control" id="forecastDemand" required>
                                </div>
                                <div class="col">
                                    <label class="form-label">生产数量</label>
                                    <input type="number" class="form-control" id="productionQuantity" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">供应商1采购 (前置期1月)</label>
                                    <input type="number" class="form-control" id="purchase1">
                                </div>
                                <div class="col">
                                    <label class="form-label">供应商2采购 (前置期0月)</label>
                                    <input type="number" class="form-control" id="purchase2">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success">提交决策</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
