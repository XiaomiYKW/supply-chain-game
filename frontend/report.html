<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应链模拟游戏 - 结算报告</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">供应链模拟游戏</span>
            <div class="d-flex">
                <button id="logoutBtn" class="btn btn-outline-light btn-sm me-2">退出</button>
                <a href="decision.html" class="btn btn-outline-light btn-sm">返回决策</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">第 <span id="reportMonth">1</span> 月结算报告</h2>
        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-success text-white">销售结果</div>
                    <div class="card-body">
                        <table class="table">
                            <tr><td>实际需求</td><td id="actualDemand">-</td></tr>
                            <tr><td>实际销售</td><td id="actualSales">-</td></tr>
                            <tr><td>销售收入</td><td id="revenue">¥0</td></tr>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-danger text-white">成本与利润</div>
                    <div class="card-body">
                        <table class="table">
                            <tr><td>总成本</td><td id="totalCost">¥0</td></tr>
                            <tr><td>本月利润</td><td id="profit" class="fw-bold text-success">¥0</td></tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-info text-white">历史趋势</div>
            <div class="card-body">
                <canvas id="historyChart" height="100"></canvas>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
