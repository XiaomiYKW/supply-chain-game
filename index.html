<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应链模拟游戏 - 登录</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            min-height: 100vh;
            background: radial-gradient(1200px 600px at 10% 10%, rgba(13, 110, 253, 0.18), transparent 60%),
                        radial-gradient(1000px 500px at 90% 0%, rgba(25, 135, 84, 0.14), transparent 55%),
                        #f8f9fa;
        }
        .card-glass {
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.92);
        }
        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row align-items-center g-4">
            <div class="col-lg-6">
                <div class="mb-4">
                    <h1 class="display-6 fw-semibold mb-2">供应链模拟游戏</h1>
                    <p class="text-secondary mb-0">用“采购-生产-销售”的月度决策，训练预测、库存与现金流管理。</p>
                </div>

                <div class="card card-glass shadow-sm border-0">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <div class="fw-semibold">快速上手</div>
                                <div class="text-secondary small">3 步开始一局</div>
                            </div>
                            <span class="badge rounded-pill text-bg-light border" id="backendStatusBadge">后端检测中</span>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-4">
                                <div class="p-3 rounded-3 border bg-white">
                                    <div class="fw-semibold">1. 登录</div>
                                    <div class="text-secondary small">首次用户名将自动注册为学生</div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="p-3 rounded-3 border bg-white">
                                    <div class="fw-semibold">2. 决策</div>
                                    <div class="text-secondary small">预测、采购、生产</div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="p-3 rounded-3 border bg-white">
                                    <div class="fw-semibold">3. 报告</div>
                                    <div class="text-secondary small">查看利润与趋势图</div>
                                </div>
                            </div>
                        </div>

                        <div class="alert alert-info mt-3 mb-0 small">
                            提示：现金不足时系统会自动下调采购量；库存超过仓库上限会产生超额成本。
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card card-glass shadow border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <h2 class="h4 fw-semibold mb-1">登录</h2>
                                <div class="text-secondary small">学生默认进入决策页，教师账号将进入排行榜</div>
                            </div>
                            <a class="btn btn-outline-secondary btn-sm" href="teacher.html">教师端</a>
                        </div>

                        <div class="alert alert-danger d-none" id="loginError"></div>

                        <form id="loginForm" class="mt-3">
                            <div class="mb-3">
                                <label for="username" class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" required autocomplete="username" placeholder="例如：student1 / teacher1">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" required autocomplete="current-password" placeholder="例如：123">
                                <div class="form-text">用于演示环境的简化登录，不建议在生产环境复用真实密码。</div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                                <span class="spinner-border spinner-border-sm me-2 d-none" id="loginSpinner" aria-hidden="true"></span>
                                <span id="loginBtnText">登录 / 注册</span>
                            </button>
                        </form>

                        <div class="mt-3 text-secondary small d-none" id="apiBaseRow">
                            后端地址：<span class="mono" id="apiBaseText">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
